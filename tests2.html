<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Style Word Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .input-section {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            align-items: center;
            flex-wrap: wrap;
        }

        #wordInput {
            flex: 1;
            min-width: 200px;
            padding: 15px 20px;
            border: 3px solid #ddd;
            border-radius: 12px;
            font-size: 1.1em;
            transition: all 0.3s ease;
            background: white;
        }

        #wordInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #addBtn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        #addBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        #clearBtn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
        }

        #clearBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
        }

        .words-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .word-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .letter-box {
            width: 60px;
            height: 60px;
            border: 3px solid #d3d6da;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            font-weight: bold;
            text-transform: uppercase;
            background: white;
            color: #333;
            transition: all 0.3s ease;
            animation: popIn 0.4s ease-out;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .letter-box:hover {
            transform: scale(1.1);
            border-color: #667eea;
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .word-counter {
            text-align: center;
            margin-top: 20px;
            font-size: 1.2em;
            color: #666;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            color: #999;
            font-size: 1.3em;
            margin-top: 40px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .input-section {
                flex-direction: column;
            }

            #wordInput {
                width: 100%;
            }

            .letter-box {
                width: 45px;
                height: 45px;
                font-size: 1.4em;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Wordle Style Display</h1>

        <div class="input-section">
            <input
                type="text"
                id="wordInput"
                placeholder="Enter a word and press Enter or click Add..."
                maxlength="15"
            >
            <button id="addBtn" class="btn">Add Word</button>
            <button id="clearBtn" class="btn">Clear All</button>
        </div>

        <div id="wordsContainer" class="words-container">
            <div class="empty-state">
                Enter words above to see them displayed in Wordle style! 🎮
            </div>
        </div>

        <div id="wordCounter" class="word-counter">
            Words added: 0
        </div>
    </div>

    <script>
        let words = [];

        const wordInput = document.getElementById('wordInput');
        const addBtn = document.getElementById('addBtn');
        const clearBtn = document.getElementById('clearBtn');
        const wordsContainer = document.getElementById('wordsContainer');
        const wordCounter = document.getElementById('wordCounter');

        function addWord() {
            const word = wordInput.value.trim().toUpperCase();

            if (word === '') {
                wordInput.focus();
                return;
            }

            if (!/^[A-Z]+$/.test(word)) {
                alert('Please enter only letters!');
                wordInput.focus();
                return;
            }

            words.push(word);
            wordInput.value = '';
            displayWords();
            updateCounter();
            wordInput.focus();
        }

        function displayWords() {
            if (words.length === 0) {
                wordsContainer.innerHTML = `
                    <div class="empty-state">
                        Enter words above to see them displayed in Wordle style! 🎮
                    </div>
                `;
                return;
            }

            let html = '';
            words.forEach((word, index) => {
                html += '<div class="word-row">';
                for (let i = 0; i < word.length; i++) {
                    html += `<div class="letter-box" style="animation-delay: ${i * 0.1}s">${word[i]}</div>`;
                }
                html += '</div>';
            });

            wordsContainer.innerHTML = html;
        }

        function updateCounter() {
            wordCounter.textContent = `Words added: ${words.length}`;
        }

        function clearAllWords() {
            if (words.length === 0) return;

            if (confirm('Are you sure you want to clear all words?')) {
                words = [];
                displayWords();
                updateCounter();
                wordInput.focus();
            }
        }

        // Event listeners
        addBtn.addEventListener('click', addWord);
        clearBtn.addEventListener('click', clearAllWords);

        wordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addWord();
            }
        });

        // Auto-focus input on page load
        wordInput.focus();

        // Initialize display
        displayWords();
        updateCounter();
    </script>
</body>
</html>
